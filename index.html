<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Comparison Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6">Price Comparison Tool</h1>
        
        <div class="mb-6">
            <label for="productUrl" class="block text-sm font-medium text-gray-700 mb-2">
                Paste product URL:
            </label>
            <input type="url" id="productUrl" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                   placeholder="https://example.com/product/123">
        </div>

        <button id="compareButton" 
                class="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition duration-200">
            Compare Prices
        </button>

        <div id="loading" class="hidden mt-6">
            <div class="flex items-center space-x-2">
                <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-500"></div>
                <span>Comparing prices...</span>
            </div>
        </div>

        <div id="results" class="hidden mt-6">
            <div id="comparisonTable"></div>
            <div id="noResults" class="hidden text-center text-gray-600 mt-4">
                No price comparisons found for this product.
            </div>
        </div>

        <div id="error" class="hidden mt-6 text-red-600">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
